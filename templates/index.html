<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Self-Healing Neural Network</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background: rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
text-align:center;
width:450px;
backdrop-filter: blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
margin-bottom:20px;
}

input{
margin:15px 0;
}

button{
background:#00c6ff;
border:none;
padding:10px 25px;
font-size:16px;
border-radius:10px;
cursor:pointer;
color:white;
}

button:hover{
background:#0072ff;
}

.result{
margin-top:20px;
text-align:left;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Self-Healing Neural Network</h1>

<input type="file" id="imageInput">

<br>

<button onclick="sendImage()">Predict</button>

<div class="result" id="output"></div>

</div>

<script>

function sendImage(){

const file = document.getElementById("imageInput").files[0];

if(!file){
alert("Upload image first");
return;
}

const formData = new FormData();
formData.append("file", file);

fetch("https://shnn.onrender.com/predict", {
method:"POST",
body:formData
})
.then(res => {
if(!res.ok){
throw new Error("Server error");
}
return res.json();
})
.then(data => {

const before = data.before_fault;
const after = data.after_fault;
const heal = data.after_healing;

document.getElementById("output").innerHTML = `
<b>Prediction Results</b><br><br>

Before Fault: Digit ${before[0]} (Confidence ${before[1]}) <br>
After Fault: Digit ${after[0]} (Confidence ${after[1]}) <br>
After Healing: Digit ${heal[0]} (Confidence ${heal[1]}) <br><br>

<b>Model Accuracy</b><br>

Baseline Accuracy: ${data.baseline_acc}% <br>
Faulty Accuracy: ${data.faulty_acc}% <br>
Healed Accuracy: ${data.healed_acc}%
`;

})
.catch(err=>{
document.getElementById("output").innerHTML="❌ Error connecting to server";
});

}

</script>

</body>
</html>
